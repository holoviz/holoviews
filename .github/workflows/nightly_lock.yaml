name: nightly_lock
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PACKAGE: "holoviews"

jobs:
  pixi_lock:
    if: ${{ !github.event.repository.fork }}
    name: Pixi lock
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: holoviz-dev/holoviz_tasks/pixi-lock@ab994f6a87c4fdb1363925d26c85a5bab2144f28 # v1.0.0
