name: nightly_lock
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PACKAGE: "holoviews"

jobs:
  pixi_lock:
    if: ${{ !github.event.repository.fork }}
    name: Pixi lock
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: holoviz-dev/holoviz_tasks/pixi-lock@f4019d8cc3d504eb650e41cd406c6af4438eba2d # v1
      - name: Upload lock-file to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-west-1"
        run: |
          zip $(date +%Y-%m-%d).zip pixi.lock pixi.toml
          aws s3 cp ./$(date +%Y-%m-%d).zip s3://assets.holoviz.org/lock/$PACKAGE/
