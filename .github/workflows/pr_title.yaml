name: title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: holoviz-dev/holoviz_tasks/validate-pr-title@1a9884850782b0b80ba2e91b573e7d63d9d3c3dc # v1.0.1
        with:
          title: ${{ github.event.pull_request.title }}
          types: |
            build
            chore
            ci
            compat
            docs
            enh
            feat
            fix
            perf
            refactor
            test
            type
          scopes: |
            bot
            dev
            data
            plotting
            bokeh
            matplotlib
            plotly
            notebook
